# ============================================================
# Release — Tag-triggered spec verification and GitHub Release
# Triggered by: git tag v*.*.*
# Spec versions must be tagged to match deployed emissions
# controller versions for audit traceability.
# Author: Richard Arlie Charles Patterson (@De-ASI-INTERFACE)
# ============================================================
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  verify-spec:
    name: Verify Spec Before Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake artifacts
        uses: actions/cache@v4
        with:
          path: |
            .lake/
            ~/.elan/
          key: ${{ runner.os }}-lake-release-${{ hashFiles('lakefile.lean', 'lakefile.toml', 'lean-toolchain') }}

      - name: lake update
        run: lake update

      - name: lake build (must be clean for release)
        run: lake build

      - name: Sorry audit (zero tolerance for release)
        run: |
          SORRY_FOUND=$(grep -rn --include="*.lean" \
            -E "^[^-]*\bsorry\b" . \
            | grep -v "/\.lake/" || true)
          if [ -n "$SORRY_FOUND" ]; then
            echo "::error::RELEASE BLOCKED - sorry found in proof files:"
            echo "$SORRY_FOUND"
            exit 1
          fi
          echo "Sorry audit passed - release is clean."

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify-spec
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lean4 QTI Emissions Spec ${{ github.ref_name }}
          body: |
            ## Lean4 QTI Emissions Controller Formal Spec — ${{ github.ref_name }}

            **Framework:** Lean 4 formal verification
            **Author:** Richard Arlie Charles Patterson (@De-ASI-INTERFACE)
            **Corresponds to:** qti-emissions-controller ${{ github.ref_name }}

            This release has passed:
            - `lake build` — all theorems compile without errors
            - Sorry audit — zero unproven axioms in production proofs
            - Spec structure lint — all 10 invariant modules present

            ### Verified Invariant Families
            - Denominator safety
            - Weight lower bounds
            - Zero-motion anti-gaming floor
            - Friction hysteresis and cooldown persistence
            - Actor quota soundness
            - Rate guard soundness
            - Settlement nonce idempotency
            - Governance timelock and mutation safety
            - Oracle freshness
            - Pause boundedness
          draft: false
          prerelease: false
          generate_release_notes: true
