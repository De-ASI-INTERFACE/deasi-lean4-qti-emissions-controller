# ============================================================
# CI — Lean 4 lake build + sorry audit + spec lint
# Triggers: push/PR to main
# Author: Richard Arlie Charles Patterson (@De-ASI-INTERFACE)
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LEAN_VERSION: "leanprover/lean4:v4.14.0"
  ELAN_TOOLCHAIN: "leanprover/lean4:v4.14.0"

jobs:
  # ----------------------------------------------------------
  # JOB 1: lake build — full Lean 4 compilation
  # ----------------------------------------------------------
  lake-build:
    name: Lake Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .lake/
            ~/.elan/
          key: ${{ runner.os }}-lake-${{ hashFiles('lakefile.lean', 'lakefile.toml', 'lean-toolchain') }}-${{ hashFiles('**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-lake-${{ hashFiles('lakefile.lean', 'lakefile.toml', 'lean-toolchain') }}-
            ${{ runner.os }}-lake-

      - name: lake update (resolve dependencies)
        run: lake update

      - name: lake build (full compilation)
        run: lake build 2>&1 | tee /tmp/lake-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lake-build-log
          path: /tmp/lake-build.log
          retention-days: 7

  # ----------------------------------------------------------
  # JOB 2: sorry audit — HARD BLOCK on any `sorry` in proofs
  # A sorry in Lean 4 is an unproven axiom. Any theorem
  # depending on sorry provides zero security guarantee.
  # This gate must never be bypassed on production theorems.
  # ----------------------------------------------------------
  sorry-audit:
    name: Sorry Audit (zero tolerance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for sorry in all .lean files
        run: |
          echo "Scanning for unproven sorry placeholders..."

          # Find all sorry usages, excluding comments
          SORRY_FOUND=$(grep -rn --include="*.lean" \
            -E "^[^-]*\bsorry\b" . \
            | grep -v "^.*--.*sorry" \
            | grep -v "/\.lake/" || true)

          if [ -n "$SORRY_FOUND" ]; then
            echo "::error::SORRY AUDIT FAILED - unproven sorry found in production theorems:"
            echo "$SORRY_FOUND" | while IFS= read -r line; do
              echo "  $line"
            done
            echo ""
            echo "Every sorry is an unproven axiom. Theorems depending on sorry provide"
            echo "zero mathematical guarantee and must not appear in production proofs."
            echo "Replace each sorry with a complete proof before merging."
            exit 1
          else
            echo "Sorry audit passed - no unproven sorry found."
          fi

  # ----------------------------------------------------------
  # JOB 3: Spec lint — validate .lean file structure
  # Checks that all invariant modules are present and
  # that module namespace matches expected DEASI.Emissions.*
  # ----------------------------------------------------------
  spec-lint:
    name: Spec Structure Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required invariant modules exist
        run: |
          python3 - <<'PYEOF'
          import os, sys

          REQUIRED_MODULES = [
              "DEASI/Emissions/Types.lean",
              "DEASI/Emissions/Rules.lean",
              "DEASI/Emissions/Invariant/Basic.lean",
              "DEASI/Emissions/Invariant/Friction.lean",
              "DEASI/Emissions/Invariant/ActorCaps.lean",
              "DEASI/Emissions/Invariant/Emissions.lean",
              "DEASI/Emissions/Invariant/Settlement.lean",
              "DEASI/Emissions/Invariant/Governance.lean",
              "DEASI/Emissions/Invariant/Oracle.lean",
              "DEASI/Emissions/Invariant/Pause.lean",
          ]

          missing = [m for m in REQUIRED_MODULES if not os.path.exists(m)]

          if missing:
              print(f"::error::SPEC LINT FAILED - {len(missing)} required module(s) missing:")
              for m in missing:
                  print(f"  MISSING: {m}")
              sys.exit(1)
          else:
              print(f"Spec lint passed - all {len(REQUIRED_MODULES)} required modules present.")
              for m in REQUIRED_MODULES:
                  print(f"  OK: {m}")
          PYEOF

      - name: Check for TODO/FIXME placeholders in proof files
        run: |
          TODOS=$(grep -rn --include="*.lean" \
            -E "\b(TODO|FIXME|HACK|XXX|PLACEHOLDER)\b" . \
            | grep -v "/\.lake/" || true)

          if [ -n "$TODOS" ]; then
            echo "::warning::Unresolved TODOs/FIXMEs found in spec files:"
            echo "$TODOS"
          else
            echo "No unresolved placeholders found."
          fi
